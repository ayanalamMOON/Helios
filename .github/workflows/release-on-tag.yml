name: Release (Tag-Driven)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests (serial for stability)
        run: go test -p 1 ./... -count=1

  build-artifacts:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive: tar.gz
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            archive: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            archive: zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries for target platform
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/build_release_artifacts.sh "${GITHUB_REF_NAME}" "${{ matrix.goos }}" "${{ matrix.goarch }}"

      - name: Package tarball (linux/macos)
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          BASE="helios-${TAG}-${{ matrix.goos }}-${{ matrix.goarch }}"
          ARCHIVE="dist/${BASE}.tar.gz"

          tar -C dist -czf "${ARCHIVE}" "${BASE}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - name: Package zip (windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $base = "helios-$tag-${{ matrix.goos }}-${{ matrix.goarch }}"
          $folder = "dist/$base"
          $archive = "dist/$base.zip"

          Compress-Archive -Path "$folder/*" -DestinationPath $archive -Force
          $hash = (Get-FileHash -Path $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $($archive.Split('/')[-1])" | Out-File -FilePath "$archive.sha256" -Encoding ascii

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  release:
    needs: build-artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-v:refname | grep -vx "${CURRENT_TAG}" | head -n1 || true)"
          PRERELEASE=false

          if [[ "${CURRENT_TAG}" == *"-rc"* || "${CURRENT_TAG}" == *"-beta"* ]]; then
            PRERELEASE=true
          fi

          echo "current=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          echo "previous=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog / release notes
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/generate_changelog.sh "${{ steps.meta.outputs.current }}" "${{ steps.meta.outputs.previous }}" > release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.current }}
          name: Helios ${{ steps.meta.outputs.current }}
          body_path: release-notes.md
          prerelease: ${{ steps.meta.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*
